services:
  - type: web
    name: knowledge-bot
    runtime: python
    buildCommand: bash build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
    disk:
      name: knowledge-data
      mountPath: /opt/render/project/src
      sizeGB: 10
