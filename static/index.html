<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Bot｜私人知識庫</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #e8d5a3;
    --accent2: #c4a97d;
    --text: #e8e8e8;
    --text-muted: #888;
    --danger: #e07070;
    --success: #7ec8a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 300px 1fr;
    grid-template-rows: 60px 1fr;
  }

  header {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 12px;
  }

  header .logo {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  header .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 4px;
  }

  header .badge {
    margin-left: auto;
    background: var(--border);
    color: var(--text-muted);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-family: 'Space Mono', monospace;
  }

  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-section h3 {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
    font-family: 'Space Mono', monospace;
  }

  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(232, 213, 163, 0.05);
  }

  .upload-zone input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-zone .icon { font-size: 28px; margin-bottom: 8px; }

  .upload-zone p {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .upload-zone strong { color: var(--accent); font-weight: 500; }

  .upload-progress { margin-top: 12px; display: none; }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
    animation: pulse-progress 1.5s infinite;
  }

  @keyframes pulse-progress {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .progress-text {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
    font-family: 'Space Mono', monospace;
  }

  .doc-list { flex: 1; overflow-y: auto; padding: 12px; }

  .doc-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: border-color 0.2s;
  }

  .doc-item:hover { border-color: var(--accent2); }
  .doc-icon { font-size: 20px; flex-shrink: 0; }
  .doc-info { flex: 1; min-width: 0; }

  .doc-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .doc-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
    font-family: 'Space Mono', monospace;
  }

  .doc-delete {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px;
    transition: color 0.2s;
    flex-shrink: 0;
  }

  .doc-delete:hover { color: var(--danger); }

  .empty-docs {
    text-align: center;
    padding: 30px 20px;
    color: var(--text-muted);
    font-size: 12px;
    line-height: 1.8;
  }

  main { display: flex; flex-direction: column; overflow: hidden; }

  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .welcome {
    text-align: center;
    padding: 60px 40px;
    color: var(--text-muted);
  }

  .welcome h2 {
    font-size: 28px;
    color: var(--accent);
    font-weight: 300;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }

  .welcome p { font-size: 14px; line-height: 1.8; }

  .message { display: flex; flex-direction: column; gap: 8px; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-items: flex-end; }
  .message.assistant { align-items: flex-start; }

  .message-label {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 1px;
  }

  .message-bubble {
    max-width: 80%;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.7;
  }

  .message.user .message-bubble {
    background: var(--accent);
    color: #1a1a1a;
    font-weight: 500;
  }

  .message.assistant .message-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .sources-section { margin-top: 16px; }

  .sources-title {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: 'Space Mono', monospace;
  }

  .source-cards { display: flex; flex-wrap: wrap; gap: 8px; }

  .source-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .source-card:hover {
    border-color: var(--accent);
    background: rgba(232, 213, 163, 0.05);
  }

  .source-card .src-name { font-size: 12px; font-weight: 500; color: var(--text); }
  .source-card .src-page { font-size: 11px; color: var(--accent2); font-family: 'Space Mono', monospace; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 900px;
    width: 100%;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .modal-title { font-size: 14px; font-weight: 500; flex: 1; }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 24px;
    cursor: pointer;
    transition: color 0.2s;
    line-height: 1;
  }

  .modal-close:hover { color: var(--text); }

  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .modal-body img { width: 100%; border-radius: 8px; border: 1px solid var(--border); }

  .modal-excerpt {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-muted);
  }

  .modal-excerpt strong {
    display: block;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-family: 'Space Mono', monospace;
  }

  .input-area {
    padding: 20px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .input-wrapper { display: flex; gap: 10px; align-items: flex-end; }

  .input-wrapper textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    resize: none;
    min-height: 48px;
    max-height: 150px;
    transition: border-color 0.2s;
    outline: none;
    line-height: 1.5;
  }

  .input-wrapper textarea:focus { border-color: var(--accent2); }
  .input-wrapper textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    background: var(--accent);
    color: #1a1a1a;
    border: none;
    border-radius: 10px;
    width: 48px;
    height: 48px;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .send-btn:hover { background: var(--accent2); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .input-hint { font-size: 11px; color: var(--text-muted); margin-top: 8px; font-family: 'Space Mono', monospace; }

  .toast {
    position: fixed;
    bottom: 80px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  .typing {
    display: flex;
    gap: 4px;
    padding: 14px 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: fit-content;
  }

  .typing span {
    width: 6px;
    height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">KNOWLEDGE BOT</div>
  <div class="subtitle">私人封閉知識庫</div>
  <div class="badge">🔒 封閉式 · 僅限資料庫</div>
</header>

<aside>
  <div class="sidebar-section">
    <h3>上傳文件</h3>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" multiple accept=".pdf,.pptx,.ppt,.docx,.doc,.jpg,.jpeg,.png,.gif,.webp">
      <div class="icon">📂</div>
      <p>拖曳或點擊上傳<br><strong>PDF · PPT · Word · 圖片</strong></p>
    </div>
    <div class="upload-progress" id="uploadProgress">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">處理中...</div>
    </div>
  </div>

  <div class="sidebar-section" style="flex:0;padding-bottom:12px;">
    <h3>已上傳文件</h3>
  </div>

  <div class="doc-list" id="docList">
    <div class="empty-docs">尚未上傳任何文件<br>請先上傳 PDF 或其他檔案</div>
  </div>
</aside>

<main>
  <div class="chat-container" id="chatContainer">
    <div class="welcome">
      <h2>你好，有什麼想查詢的？</h2>
      <p>這是你的私人知識庫<br>所有答案只來自你上傳的文件<br>不使用任何外部資訊</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="questionInput" placeholder="輸入問題，按 Enter 送出..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="askQuestion()">↑</button>
    </div>
    <div class="input-hint">Enter 送出 · Shift+Enter 換行</div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">文件頁面</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  loadDocuments();

  const uploadZone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');

  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    uploadFiles(e.dataTransfer.files);
  });

  fileInput.addEventListener('change', e => uploadFiles(e.target.files));

  async function uploadFiles(files) {
    if (!files.length) return;
    const progress = document.getElementById('uploadProgress');
    const fill = document.getElementById('progressFill');
    const text = document.getElementById('progressText');
    progress.style.display = 'block';

    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      text.textContent = `處理中：${file.name}`;
      fill.style.width = `${((i / files.length) * 100)}%`;

      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.success) {
          showToast(`✅ ${file.name} — ${data.message}`, 'success');
        } else {
          showToast(`❌ ${file.name} 上傳失敗`, 'error');
        }
      } catch (err) {
        showToast(`❌ 上傳錯誤：${err.message}`, 'error');
      }
    }

    fill.style.width = '100%';
    text.textContent = '完成！';
    setTimeout(() => { progress.style.display = 'none'; fill.style.width = '0%'; }, 1500);
    fileInput.value = '';
    loadDocuments();
  }

  async function loadDocuments() {
    const res = await fetch('/documents');
    const data = await res.json();
    const list = document.getElementById('docList');

    if (!data.documents.length) {
      list.innerHTML = '<div class="empty-docs">尚未上傳任何文件<br>請先上傳 PDF 或其他檔案</div>';
      return;
    }

    const icons = { pdf: '📄', pptx: '📊', ppt: '📊', docx: '📝', doc: '📝', jpg: '🖼️', jpeg: '🖼️', png: '🖼️' };

    list.innerHTML = data.documents.map(doc => {
      const ext = doc.filename.split('.').pop().toLowerCase();
      const icon = icons[ext] || '📎';
      return `
        <div class="doc-item">
          <div class="doc-icon">${icon}</div>
          <div class="doc-info">
            <div class="doc-name" title="${doc.filename}">${doc.filename}</div>
            <div class="doc-meta">${doc.page_count} 頁</div>
          </div>
          <button class="doc-delete" onclick="deleteDoc('${doc.doc_id}', '${doc.filename}')" title="刪除">🗑</button>
        </div>
      `;
    }).join('');
  }

  async function deleteDoc(docId, filename) {
    if (!confirm(`確定要刪除「${filename}」嗎？`)) return;
    await fetch(`/document/${docId}`, { method: 'DELETE' });
    showToast(`已刪除 ${filename}`, 'success');
    loadDocuments();
  }

  const input = document.getElementById('questionInput');
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askQuestion(); }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 150) + 'px';
  });

  async function askQuestion() {
    const question = input.value.trim();
    if (!question) return;

    const container = document.getElementById('chatContainer');
    const sendBtn = document.getElementById('sendBtn');

    const welcome = container.querySelector('.welcome');
    if (welcome) welcome.remove();

    container.innerHTML += `
      <div class="message user">
        <div class="message-label">YOU</div>
        <div class="message-bubble">${escapeHtml(question)}</div>
      </div>
    `;

    const loadingId = 'loading-' + Date.now();
    container.innerHTML += `
      <div class="message assistant" id="${loadingId}">
        <div class="message-label">KNOWLEDGE BOT</div>
        <div class="typing"><span></span><span></span><span></span></div>
      </div>
    `;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    container.scrollTop = container.scrollHeight;

    try {
      const formData = new FormData();
      formData.append('question', question);
      formData.append('top_k', '5');

      const res = await fetch('/ask', { method: 'POST', body: formData });
      const data = await res.json();

      document.getElementById(loadingId).remove();

      let sourcesHtml = '';
      if (data.sources && data.sources.length > 0) {
        const cards = data.sources.map(src => `
          <div class="source-card" onclick="viewPage('${src.doc_id}', ${src.page - 1}, '${escapeHtml(src.filename)}', ${src.page}, '${escapeHtml(src.relevant_text)}')">
            <div class="src-icon">📄</div>
            <div class="src-info">
              <div class="src-name">${escapeHtml(src.filename)}</div>
              <div class="src-page">第 ${src.page} 頁 ${src.has_image ? '· 點擊看原頁' : ''}</div>
            </div>
          </div>
        `).join('');

        sourcesHtml = `
          <div class="sources-section">
            <div class="sources-title">📍 資料來源</div>
            <div class="source-cards">${cards}</div>
          </div>
        `;
      }

      container.innerHTML += `
        <div class="message assistant">
          <div class="message-label">KNOWLEDGE BOT</div>
          <div class="message-bubble">${escapeHtml(data.answer).replace(/\n/g, '<br>')}</div>
          ${sourcesHtml}
        </div>
      `;

    } catch (err) {
      document.getElementById(loadingId).remove();
      container.innerHTML += `
        <div class="message assistant">
          <div class="message-label">KNOWLEDGE BOT</div>
          <div class="message-bubble" style="color:var(--danger)">查詢失敗：${err.message}</div>
        </div>
      `;
    }

    sendBtn.disabled = false;
    container.scrollTop = container.scrollHeight;
  }

  async function viewPage(docId, pageNum, filename, displayPage, relevantText) {
    const overlay = document.getElementById('modalOverlay');
    const body = document.getElementById('modalBody');
    const title = document.getElementById('modalTitle');

    title.textContent = `${filename} · 第 ${displayPage} 頁`;
    body.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">載入中...</div>';
    overlay.classList.add('show');

    try {
      const res = await fetch(`/page-image/${docId}/${pageNum}`);
      const data = await res.json();

      body.innerHTML = `
        <img src="data:image/png;base64,${data.image_base64}" alt="第 ${displayPage} 頁">
        <div class="modal-excerpt">
          <strong>找到的相關段落</strong>
          ${escapeHtml(relevantText)}...
        </div>
      `;
    } catch (err) {
      body.innerHTML = `<div style="color:var(--danger);padding:20px">無法載入頁面圖片</div>`;
    }
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modalOverlay')) {
      document.getElementById('modalOverlay').classList.remove('show');
    }
  }

  function showToast(msg, type = '') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = `toast ${type} show`;
    setTimeout(() => toast.className = 'toast', 3500);
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
